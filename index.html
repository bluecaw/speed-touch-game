<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speed Touch 25 - Firebase Edition</title>
    <style>
        :root {
            --primary-color: #4285f4;
            --success-color: #34a853;
            --error-color: #ea4335;
            --bg-color: #ffffff;
            --panel-color: #f8f9fa;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            background-color: var(--bg-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-panel { text-align: center; margin-bottom: 10px; width: 100%; }
        .timer { font-size: 3rem; font-weight: bold; color: #333; font-variant-numeric: tabular-nums; line-height: 1; }
        .next-number { font-size: 1.2rem; color: var(--primary-color); font-weight: bold; margin-top: 5px; }

        .setup-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            text-align: center;
        }

        .grid {
            display: none; 
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .grid.playing {
            display: grid;
        }

        .cell {
            background-color: var(--panel-color);
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #ccc;
            transition: all 0.1s;
        }

        .cell:active { transform: translateY(2px); box-shadow: 0 1px 0 #ccc; }

        /* 【修正ポイント】正解したときに透明にして消す設定 */
        .cell.correct { 
            background-color: transparent; 
            color: transparent; 
            box-shadow: none; 
            transform: translateY(2px);
            cursor: default;
            opacity: 0;
            transition: opacity 0.3s ease; /* 0.3秒かけて消える */
        }

        .cell.wrong { background-color: var(--error-color); color: white; animation: shake 0.2s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .controls { width: 100%; margin: 20px 0; display: flex; flex-direction: column; gap: 8px; }
        button {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
        }

        .ranking {
            width: 100%;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 12px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
            margin-top: 10px;
        }
        .ranking h3 { margin: 0 0 10px 0; font-size: 1rem; color: #555; text-align: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }
        .r-name { font-weight: bold; color: #333; }
        .r-time { font-family: monospace; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="info-panel">
        <div class="timer" id="timer">0.000</div>
        <div class="next-number">NEXT: <span id="target">1</span></div>
    </div>

    <div class="setup-area">
        <input type="text" id="playerName" placeholder="名前を入力" maxlength="10">
        <button id="startBtn">ゲーム開始 / リセット</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="ranking">
        <h3>🏆 WORLD RANKING (TOP 10)</h3>
        <div id="rankingList">読み込み中...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- Firebase 設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDmERQEIQKssVy12KodGDjwfIDbWcwBOmo",
        authDomain: "speedtouch25-ca738.firebaseapp.com",
        projectId: "speedtouch25-ca738",
        storageBucket: "speedtouch25-ca738.appspot.com",
        messagingSenderId: "865990228190",
        appId: "1:865990228190:web:96e1a76f2648507851a719"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rankingCol = collection(db, "rankings");

    // --- ゲーム変数 ---
    let nextNum = 1;
    let startTime, timerInterval, isRunning = false;
    let audioCtx = null;

    // --- 初期表示 ---
    updateRankingDisplay();
    createBoard(true);

    // --- ボタンイベント登録 ---
    document.getElementById('startBtn').addEventListener('click', initGame);

    function playSound(freq, type, duration, vol=0.1) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) { console.log("Audio Error"); }
    }

    function createBoard(isPreview = false) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        if (!isPreview) grid.classList.add('playing');
        else grid.classList.remove('playing');

        const nums = Array.from({length: 25}, (_, i) => i + 1);
        if(!isPreview) {
            for(let i=nums.length-1; i>0; i--){
                const j = Math.floor(Math.random()*(i+1));
                [nums[i], nums[j]] = [nums[j], nums[i]];
            }
        }
        nums.forEach(num => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<span>${num}</span>`;
            cell.onclick = () => handleTouch(num, cell);
            grid.appendChild(cell);
        });
    }

    function initGame() {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        clearInterval(timerInterval);
        nextNum = 1;
        document.getElementById('target').textContent = "1";
        createBoard(false);
        isRunning = true;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            document.getElementById('timer').textContent = ((Date.now() - startTime) / 1000).toFixed(3);
        }, 47);
    }

    function handleTouch(num, element) {
        if (!isRunning) return;
        if (element.classList.contains('correct')) return;

        if (num === nextNum) {
            playSound(880, 'sine', 0.1);
            
            // 正解クラスを追加（CSSで消える）
            element.classList.add('correct');
            
            nextNum++;
            if (nextNum > 25) {
                clearInterval(timerInterval);
                isRunning = false;
                const time = ((Date.now() - startTime) / 1000).toFixed(3);
                saveRecord(time);
                playSound(1046, 'sine', 0.5);
            } else {
                document.getElementById('target').textContent = nextNum;
            }
        } else {
            playSound(150, 'sawtooth', 0.2, 0.05);
            element.classList.add('wrong');
            setTimeout(() => element.classList.remove('wrong'), 200);
        }
    }

    async function saveRecord(time) {
        const name = document.getElementById('playerName').value.trim() || 'ななしさん';
        try {
            await addDoc(rankingCol, {
                name: name,
                time: parseFloat(time),
                createdAt: serverTimestamp()
            });
            updateRankingDisplay();
            setTimeout(() => alert(`【記録更新】\n${name}：${time}秒\nランキングに登録しました！`), 100);
        } catch (e) {
            console.error("保存失敗:", e);
        }
    }

    async function updateRankingDisplay() {
        const list = document.getElementById('rankingList');
        try {
            const q = query(rankingCol, orderBy("time", "asc"), limit(10));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                list.innerHTML = '<p style="text-align:center; color:#999; font-size:0.8rem;">記録待ち...</p>';
                return;
            }

            let html = "";
            let i = 1;
            querySnapshot.forEach((docSnap) => {
                const r = docSnap.data();
                html += `
                    <div class="ranking-item">
                        <span>${i}. <span class="r-name">${escapeHtml(r.name)}</span></span>
                        <span class="r-time">${Number(r.time).toFixed(3)}s</span>
                    </div>
                `;
                i++;
            });
            list.innerHTML = html;
        } catch (e) {
            console.error("読み込み失敗:", e);
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }
</script>
</body>
</html>
